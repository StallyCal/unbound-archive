<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNBOUND // ARCHIVE_2026</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Inter:ital,wght@0,300;0,700;0,900;1,900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        :root { --bg: #000000; --text: #ffffff; --accent: #FF0032; }
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; width: 100vw; height: 100vh; transition: background 0.8s ease, color 0.8s ease; }

        body.light-mode { --bg: #e5e5e5; --text: #050505; --accent: #0055ff; }

        #monolith-bg { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; font-weight: 900; font-size: 22vw; z-index: 11; pointer-events: none; letter-spacing: -1vw; white-space: nowrap; transition: opacity 1.5s ease; color: transparent; background-image: radial-gradient(circle 200px at -1000px -1000px, rgba(255, 255, 255, 0.35) 0%, rgba(255, 255, 255, 0.03) 100%); -webkit-background-clip: text; background-clip: text; }
        body.active #monolith-bg { opacity: 0; }

        #video-plate { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; background: radial-gradient(circle at center, #0a0002 0%, #000 100%); transition: opacity 1.5s cubic-bezier(0.19, 1, 0.22, 1), background 0.8s ease; }
        body.light-mode #video-plate { background: radial-gradient(circle at center, #ffffff 0%, #d5d5d5 100%); }
        body.active #video-plate { opacity: 0; pointer-events: none; }

        #cursor-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 100000; }
        #cursor { position: absolute; width: 500px; height: 500px; background: radial-gradient(circle 250px at center, rgba(255, 0, 50, 0.02) 0%, transparent 70%); border-radius: 50%; transform: translate(-50%, -50%); display: flex; align-items: center; justify-content: center; will-change: left, top; transition: 0.2s transform; }
        #cursor.hover-node { transform: translate(-50%, -50%) scale(0.6); background: radial-gradient(circle 250px at center, rgba(255, 0, 50, 0.08) 0%, transparent 70%); }
        body.light-mode #cursor.hover-node { background: radial-gradient(circle 250px at center, rgba(0, 85, 255, 0.08) 0%, transparent 70%); }
        #cursor::after { content: ''; width: 4px; height: 4px; background: var(--text); border-radius: 50%; box-shadow: 0 0 10px var(--text); transition: 0.2s; }
        #cursor.hover-node::after { transform: scale(3); background: var(--accent); box-shadow: 0 0 20px var(--accent); }

        .external-hud { position: fixed; padding: 35px; font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 700; letter-spacing: 4px; color: rgba(255,255,255,0.4); z-index: 5000; text-transform: uppercase; pointer-events: none; transition: opacity 0.8s ease, color 0.8s ease; }
        body.light-mode .external-hud { color: rgba(0,0,0,0.6); }
        .top-right { top: 0; right: 0; text-align: right; } .bottom-left { bottom: 0; left: 0; }
        .bottom-right { bottom: 0; right: 0; pointer-events: auto; cursor: none; transition: 0.3s; }
        .bottom-right:hover { color: var(--text); } body.light-mode .bottom-right:hover { color: #000; font-weight: 800; }
        
        #webgl-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 10; pointer-events: none; opacity: 0; transition: opacity 2s ease; }
        body.active #webgl-container { opacity: 1; pointer-events: auto; }

        @keyframes pulseCore { 0% { box-shadow: inset 0 0 15px rgba(255,0,50,0.2), 0 10px 30px rgba(0,0,0,0.8); } 50% { box-shadow: inset 0 0 25px rgba(255,0,50,0.4), 0 10px 40px rgba(255,0,50,0.15); } 100% { box-shadow: inset 0 0 15px rgba(255,0,50,0.2), 0 10px 30px rgba(0,0,0,0.8); } }
        @keyframes pulseCoreLight { 0% { box-shadow: inset 0 0 15px rgba(0,85,255,0.2), 0 10px 30px rgba(0,0,0,0.1); } 50% { box-shadow: inset 0 0 25px rgba(0,85,255,0.4), 0 10px 40px rgba(0,85,255,0.15); } 100% { box-shadow: inset 0 0 15px rgba(0,85,255,0.2), 0 10px 30px rgba(0,0,0,0.1); } }

        #core-wrap { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 25000; transition: all 1s cubic-bezier(0.19, 1, 0.22, 1); }
        .core { width: 100px; height: 100px; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; z-index: 10; cursor: none; background: rgba(5,0,0,0.8); border: 1px solid rgba(255, 0, 50, 0.15); backdrop-filter: blur(10px); transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1); }
        body:not(.active) .core { animation: pulseCore 3s infinite ease-in-out; }
        body.light-mode .core { background: rgba(255,255,255,0.8); border-color: rgba(0,85,255,0.4); }
        body.light-mode:not(.active) .core { animation: pulseCoreLight 3s infinite ease-in-out; }
        .core:hover { box-shadow: inset 0 0 30px rgba(255,0,50,0.6), 0 5px 25px rgba(255,0,50,0.3) !important; border-color: rgba(255,0,50,0.8); transform: scale(1.05); }
        body.light-mode .core:hover { box-shadow: inset 0 0 30px rgba(0,85,255,0.5), 0 5px 25px rgba(0,85,255,0.2) !important; border-color: rgba(0,85,255,0.8); }
        .core-text { font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700; color: #fff; letter-spacing: 2px; transition: 0.3s; text-align: center; text-transform: uppercase;}
        body.light-mode .core-text { color: #000; }
        body.active .core { border-color: rgba(255,0,50,0.4); transform: scale(0.85); animation: none; box-shadow: inset 0 0 20px rgba(255,0,50,0.3), 0 0 20px rgba(0,0,0,0.8); }
        body.light-mode.active .core { border-color: rgba(0,85,255,0.5); animation: none; box-shadow: inset 0 0 20px rgba(0,85,255,0.3), 0 0 20px rgba(0,0,0,0.1); }
        body.in-archive #core-wrap { top: 50px; transform: translate(-50%, 0) scale(0.7); }
        body.in-archive .core { background: rgba(0,0,0,0.9); } body.light-mode.in-archive .core { background: rgba(255,255,255,0.9); }
        body.in-archive .core:hover { background: rgba(255,0,50,0.15); border-color: var(--accent); } body.light-mode.in-archive .core:hover { background: rgba(0,85,255,0.1); border-color: var(--accent); }
        body.in-archive .core:hover .core-text { color: #fff; } body.light-mode.in-archive .core:hover .core-text { color: #000; }

        #spatial-labels-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 150; pointer-events: none; }
        .spatial-label { position: absolute; top: -55px; left: 0; transform: translate(-50%, -50%); color: rgba(255, 255, 255, 0.6); font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 700; letter-spacing: 6px; text-transform: uppercase; cursor: none; pointer-events: auto; opacity: 0; transition: opacity 0.4s, color 0.4s, text-shadow 0.4s; will-change: transform, opacity; padding: 25px; text-shadow: 0 4px 15px rgba(0,0,0,1); }
        body.light-mode .spatial-label { color: rgba(0,0,0,0.6); text-shadow: 0 4px 15px rgba(255,255,255,1); }
        .spatial-label:hover { color: #fff; text-shadow: 0 0 15px var(--accent), 0 0 30px var(--accent); } body.light-mode .spatial-label:hover { color: #000; text-shadow: 0 0 15px var(--accent), 0 0 30px var(--accent); }

        #projector-container { position: fixed; bottom: 8vh; left: 50%; transform: translateX(-50%); width: 90vw; height: 85vh; z-index: 8000; display: none; flex-direction: column; align-items: center; pointer-events: none; transform-origin: bottom center; }
        #projector-flare { position: absolute; bottom: -12vh; left: 50%; transform: translateX(-50%); width: 400px; height: 200px; background: radial-gradient(ellipse at center, rgba(255,255,255,0.9) 0%, rgba(255,0,50,0.8) 15%, rgba(255,0,50,0) 60%); pointer-events: none; opacity: 0; transition: opacity 0.6s ease; mix-blend-mode: screen; }
        body.light-mode #projector-flare { background: radial-gradient(ellipse at center, rgba(0,85,255,0.4) 0%, rgba(0,85,255,0.2) 15%, transparent 60%); mix-blend-mode: normal; }
        #projector-beam { position: absolute; bottom: -8vh; left: 50%; transform: translateX(-50%); width: 100%; height: calc(100% + 8vh); background: linear-gradient(to top, rgba(255, 0, 50, 0.25) 0%, rgba(255, 0, 50, 0.05) 40%, rgba(255,0,50,0) 100%); clip-path: polygon(49.5% 100%, 50.5% 100%, 49.5% 100%, 50.5% 100%); opacity: 0; pointer-events: none; transition: opacity 0.2s ease, clip-path 0.7s cubic-bezier(0.19, 1, 0.22, 1) 0.1s; }
        body.light-mode #projector-beam { background: linear-gradient(to top, rgba(0, 85, 255, 0.15) 0%, rgba(0, 85, 255, 0.02) 40%, transparent 100%); }
        
        @keyframes holoBoot { 0% { opacity: 0; filter: blur(20px) brightness(3); transform: perspective(1200px) rotateX(20deg) translateY(100px) scale(0.9); } 30% { opacity: 1; filter: blur(5px) brightness(1.8); } 40% { opacity: 0.5; filter: blur(10px) brightness(2.5); } 60% { opacity: 1; filter: blur(2px) brightness(1.2); } 100% { opacity: 1; filter: blur(0px) brightness(1); transform: perspective(1200px) rotateX(0deg) translateY(0) scale(1); } }
        @keyframes panScanlines { 0% { background-position: 0 0; } 100% { background-position: 0 2px; } }

        #projector-screen { width: 100%; height: 100%; transform-origin: bottom center; transform: perspective(1200px) rotateX(10deg) translateY(50px) scale(0.95); opacity: 0; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        .projector-backdrop { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(5,0,0,0.8), rgba(0,0,0,0.95)); border-radius: 4px; border-top: 1px solid rgba(255,0,50,0.3); box-shadow: 0 -20px 60px rgba(0,0,0,0.9), inset 0 20px 60px rgba(255,0,50,0.05); backdrop-filter: blur(12px); z-index: 0; pointer-events: none; transition: background 0.5s ease, border-color 0.5s ease; }
        body.light-mode .projector-backdrop { background: linear-gradient(to bottom, rgba(245,245,245,0.9), rgba(230,230,230,0.95)); border-top: 1px solid rgba(0,85,255,0.3); box-shadow: 0 -20px 60px rgba(0,0,0,0.1), inset 0 20px 60px rgba(0,85,255,0.05); }

        .projector-backdrop::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15), rgba(0,0,0,0.15) 1px, transparent 1px, transparent 2px); background-size: 100% 2px; pointer-events: none; z-index: 50; opacity: 0.6; animation: panScanlines 0.5s linear infinite; }
        body.light-mode .projector-backdrop::after { background: repeating-linear-gradient(0deg, rgba(0,0,0,0.05), rgba(0,0,0,0.05) 1px, transparent 1px, transparent 2px); background-size: 100% 2px; }
        
        body.in-archive #projector-flare { opacity: 1; transition-delay: 0.2s; }
        body.in-archive #projector-beam { clip-path: polygon(20% 100%, 80% 100%, 100% 0, 0 0); opacity: 1; transition-delay: 0.1s; }
        body.in-archive #projector-screen { animation: holoBoot 1s cubic-bezier(0.19, 1, 0.22, 1) forwards; animation-delay: 0.1s; pointer-events: auto; }

        .projector-header { width: 100%; height: 90px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); display: flex; justify-content: space-between; align-items: center; padding: 0 50px; z-index: 20; flex-shrink: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.8), rgba(0,0,0,0)); position: relative; }
        body.light-mode .projector-header { border-bottom-color: rgba(0,0,0,0.1); background: linear-gradient(to bottom, rgba(255,255,255,0.8), rgba(255,255,255,0)); }
        #proj-title { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 700; color: rgba(255,255,255,0.6); letter-spacing: 4px; transition: color 0.5s; } 
        body.light-mode #proj-title { color: rgba(0,0,0,0.9); }

        .header-actions { display: flex; gap: 15px; align-items: center; }
        .action-btn { background: rgba(0,0,0,0.4); border: 1px solid rgba(255, 255, 255, 0.15); color: rgba(255, 255, 255, 0.6); padding: 10px 20px; font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 3px; font-weight: 700; cursor: none; pointer-events: auto; transition: 0.3s; border-radius: 4px; backdrop-filter: blur(5px); text-transform: uppercase; }
        .action-btn:hover { background: rgba(255, 255, 255, 0.1); border-color: rgba(255,255,255,0.8); color: #fff; }
        body.light-mode .action-btn { background: rgba(255,255,255,0.5); border-color: rgba(0,0,0,0.2); color: rgba(0,0,0,0.7); }
        body.light-mode .action-btn:hover { background: rgba(255,255,255,0.9); border-color: rgba(0,0,0,0.6); color: #000; }
        .action-btn.primary { background: rgba(255,0,50,0.05); border-color: rgba(255, 0, 50, 0.3); color: rgba(255, 255, 255, 0.9); }
        .action-btn.primary:hover { background: rgba(255, 0, 50, 0.15); border-color: rgba(255,0,50,0.8); box-shadow: 0 0 20px rgba(255,0,50,0.4); color: #fff; transform: scale(1.03); }
        body.light-mode .action-btn.primary { background: rgba(0,85,255,0.05); border-color: rgba(0, 85, 255, 0.3); color: rgba(0, 0, 0, 0.8); }
        body.light-mode .action-btn.primary:hover { background: rgba(0,85,255,0.15); border-color: rgba(0,85,255,0.6); box-shadow: 0 0 15px rgba(0,85,255,0.2); color: #000; }

        #projector-scroll-area { flex-grow: 1; width: 100%; overflow-y: scroll; scrollbar-width: none; position: relative; z-index: 10; scroll-behavior: smooth; transform: translate3d(0, 0, 0); will-change: transform; -webkit-overflow-scrolling: touch; }
        #projector-scroll-area::-webkit-scrollbar { display: none; }
        
        #title-canvas-wrapper { position: relative; width: 100%; height: 350px; flex-shrink: 0; pointer-events: none; }
        #title-canvas-wrapper canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        .content-padding { padding: 0 5vw 10vh 5vw; }
        .creative-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 40px; transition: opacity 0.5s ease; }
        .content-card { position: relative; border: 1px solid rgba(255,255,255,0.05); background: rgba(10,0,0,0.6); transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1); pointer-events: auto; border-radius: 4px; overflow: hidden; transform: translateZ(0); backdrop-filter: blur(5px); }
        .content-card:hover { border-color: rgba(255,0,50,0.5); background: rgba(255,0,50,0.05); box-shadow: 0 15px 40px rgba(0,0,0,0.8), 0 0 30px rgba(255,0,50,0.1); transform: translateY(-5px) translateZ(0); }
        body.light-mode .content-card { border-color: rgba(0,0,0,0.05); background: rgba(255,255,255,0.6); }
        body.light-mode .content-card:hover { border-color: rgba(0,85,255,0.4); background: rgba(0,85,255,0.05); box-shadow: 0 10px 30px rgba(0,0,0,0.1); }

        .w-6 { grid-column: span 6; height: 380px; } .w-4 { grid-column: span 4; height: 480px; } .w-8 { grid-column: span 8; height: 420px; } .w-12 { grid-column: span 12; height: 550px; }
        .card-meta { position: absolute; bottom: 25px; left: 25px; font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700; color: #666; letter-spacing: 3px; transition: 0.3s; text-transform: uppercase; }
        .content-card:hover .card-meta { color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.5); } body.light-mode .content-card:hover .card-meta { color: #000; text-shadow: none; }

        @media (max-width: 768px) {
            * { cursor: auto !important; } #cursor-container { display: none; }
            .external-hud { font-size: 10px; padding: 20px; letter-spacing: 2px; }
            #monolith-bg { top: 50%; font-size: 13.5vw; letter-spacing: 0vw; width: 100vw; text-align: center; } 
            .core { width: 50px; height: 50px; } .core-text { font-size: 7px; letter-spacing: 1px;}
            body.in-archive #core-wrap { top: 30px; transform: translate(-50%, 0) scale(0.6); }
            .spatial-label { font-size: 10px; padding: 10px; }
            #projector-container { width: 95vw; height: 90vh; bottom: 5vh; }
            .projector-header { padding: 0 15px; height: 70px; }
            .header-actions { gap: 8px; } .action-btn { padding: 8px 12px; font-size: 9px; letter-spacing: 1px; }
            .creative-grid { grid-template-columns: 1fr; gap: 20px; }
            .w-6, .w-4, .w-8, .w-12 { grid-column: span 1 !important; height: 300px !important; }
            #title-canvas-wrapper { height: 200px; }
        }
    </style>
</head>
<body id="main-body">

    <div id="monolith-bg">UNBOUND</div>
    <div id="cursor-container"><div id="cursor"></div></div>
    <div class="external-hud top-right" id="hud-top">SYSTEM_STATUS: ONLINE<br>CORE_ARCHIVE: 2026</div>
    <div class="external-hud bottom-left" id="hud-bottom">FEELING_IS_FREEDOM // UNBOUND</div>
    <div class="external-hud bottom-right" id="theme-toggle" onclick="toggleTheme()">[ LIGHT_MODE ]</div>
    <div id="video-plate"></div>
    <div id="webgl-container"></div>
    <div id="spatial-labels-container"></div>

    <div id="core-wrap">
        <div class="core" onclick="toggleSystem()"><span class="core-text" id="core-btn">INITIATE</span></div>
    </div>

    <div id="projector-container">
        <div id="projector-flare"></div>
        <div id="projector-beam"></div>
        <div id="projector-screen">
            <div class="projector-backdrop"></div>
            <div class="projector-header">
                <span id="proj-title">// SUB_ROUTINE</span>
                <div class="header-actions">
                    <button class="action-btn" id="visual-toggle-btn" onclick="toggleVisualState()">[ TOGGLE_VISUAL ]</button>
                    <button class="action-btn primary" onclick="morphToNextNode()">NEXT_NODE &rarr;</button>
                </div>
            </div>
            
            <div id="projector-scroll-area">
                <div id="title-canvas-wrapper"></div>
                <div class="content-padding">
                    <div class="creative-grid" id="content-grid">
                        <div class="content-card w-8"><div class="card-meta">DATA_REF // 001</div></div>
                        <div class="content-card w-4"><div class="card-meta">DATA_REF // 002</div></div>
                        <div class="content-card w-12"><div class="card-meta">STREAM_EXPANSION_NODE</div></div>
                        <div class="content-card w-6"><div class="card-meta">DATA_REF // 003</div></div>
                        <div class="content-card w-6"><div class="card-meta">DATA_REF // 004</div></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const isMobile = window.innerWidth <= 768;
        const cursor = document.getElementById('cursor'); const monolith = document.getElementById('monolith-bg');
        let isLightMode = false; let lastMouseX = -1000, lastMouseY = -1000;
        
        function updateTorch(x, y) {
            lastMouseX = x; lastMouseY = y;
            if (isSystemActive) return; 
            if (isLightMode) monolith.style.backgroundImage = `radial-gradient(circle 200px at ${x}px ${y}px, rgba(0, 0, 0, 0.5) 0%, rgba(0, 0, 0, 0.05) 100%)`;
            else monolith.style.backgroundImage = `radial-gradient(circle 200px at ${x}px ${y}px, rgba(255, 255, 255, 0.35) 0%, rgba(255, 255, 255, 0.03) 100%)`;
        }

        document.addEventListener('mousemove', e => { if(!isMobile) { cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px'; } updateTorch(e.clientX, e.clientY); });
        window.addEventListener('touchstart', e => { if(e.touches.length > 0) updateTorch(e.touches[0].clientX, e.touches[0].clientY); }, {passive: true});
        window.addEventListener('touchmove', e => { if(e.touches.length > 0) updateTorch(e.touches[0].clientX, e.touches[0].clientY); }, {passive: true});

        class AudioSystem {
            constructor() { this.ctx = null; this.unlocked = false; this.binauralGain = null; }
            init() {
                if(this.unlocked) { if(this.ctx && this.ctx.state === 'suspended') this.ctx.resume(); return; }
                const AudioContext = window.AudioContext || window.webkitAudioContext; this.ctx = new AudioContext();
                this.binauralGain = this.ctx.createGain(); this.binauralGain.gain.value = 0; this.binauralGain.connect(this.ctx.destination);
                const oscL = this.ctx.createOscillator(); const oscR = this.ctx.createOscillator(); oscL.type = 'sine'; oscR.type = 'sine'; oscL.frequency.value = 144; oscR.frequency.value = 148; 
                if (this.ctx.createStereoPanner) { const panL = this.ctx.createStereoPanner(); panL.pan.value = -1; const panR = this.ctx.createStereoPanner(); panR.pan.value = 1; oscL.connect(panL).connect(this.binauralGain); oscR.connect(panR).connect(this.binauralGain);
                } else { oscL.connect(this.binauralGain); oscR.connect(this.binauralGain); }
                oscL.start(); oscR.start(); this.unlocked = true;
            }
            playHover() {
                if(!this.ctx) return; const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain(); osc.type = 'sine'; 
                osc.frequency.setValueAtTime(40, this.ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(10, this.ctx.currentTime + 0.1); 
                gain.gain.setValueAtTime(0, this.ctx.currentTime); gain.gain.linearRampToValueAtTime(0.4, this.ctx.currentTime + 0.02); gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.1);
                osc.connect(gain); gain.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime + 0.1);
            }
            playDive() {
                if(!this.ctx) return; const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain(); osc.type = 'sine'; 
                osc.frequency.setValueAtTime(100, this.ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(20, this.ctx.currentTime + 1.5); 
                gain.gain.setValueAtTime(0.6, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 1.5);
                osc.connect(gain); gain.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime + 1.5);
            }

                    holoU[i] = pts[i].u !== undefined ? pts[i].u : 0; holoV[i] = pts[i].v !== undefined ? pts[i].v : 0;
                }
            }
        }

        function triggerMorphState(newState) {
            visualState = newState; buildDataMap();
        }

        function toggleVisualState() { visualState = (visualState === 'TEXT') ? 'SHAPE' : 'TEXT'; triggerMorphState(visualState); }

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate); const time = clock.getElapsedTime();

            if (isSystemActive && transitionProgress < 1) transitionProgress += 0.012; else if (!isSystemActive && transitionProgress > 0) transitionProgress -= 0.03; transitionProgress = Math.max(0, Math.min(1, transitionProgress));
            const ease = 1 - Math.pow(1 - transitionProgress, 5); let targetDim = document.body.classList.contains('in-archive') ? 0.15 : 1.0; backgroundDimFactor += (targetDim - backgroundDimFactor) * 0.1;
            dustMat.opacity = Math.max(0.15, 0.4 * backgroundDimFactor); lineMat.opacity = Math.max(0.05, 0.15 * backgroundDimFactor); nodeMat.opacity = Math.max(0.45, 1.0 * backgroundDimFactor); 
            
            if (activeNodeIndex !== -1 && interactableNodes[activeNodeIndex]) { interactableNodes[activeNodeIndex].children[0].material.opacity = 1.0; let pulse = 1 + Math.sin(time * 5) * 0.15; interactableNodes[activeNodeIndex].children[0].scale.setScalar(250 * pulse); }

            if (backgroundDimFactor > 0.1) {
                const dPos = dustGeo.attributes.position.array; let cinematicSpeed = isDiving || isReturning || isMorphing ? easeInOutExpo(warpProgress || morphProgress) : 0; let camX = camera.position.x; let camY = camera.position.y; let camZ = camera.position.z;
                for (let i = 0; i < dustCount; i++) {
                    let i3 = i * 3; let nx = Math.sin(time * 0.2 + dustPhases[i]) * 20 * ease; let ny = Math.cos(time * 0.15 + dustPhases[i]) * 20 * ease; let nz = Math.sin(time * 0.25 + dustPhases[i]) * 20 * ease;
                    if (isDiving || isReturning || isMorphing) { let dx = dustTargets[i3] - camX; let dy = dustTargets[i3+1] - camY; let distSq = dx*dx + dy*dy; if (distSq < 250000 && camZ > dustTargets[i3+2]) { let dist = Math.sqrt(distSq); let force = Math.pow((500 - dist) / 500, 2); nx += (dx / dist) * force * 500 * cinematicSpeed; ny += (dy / dist) * force * 500 * cinematicSpeed; } }
                    dPos[i3] = (dustTargets[i3] * ease) + nx; dPos[i3+1] = (dustTargets[i3+1] * ease) + ny; dPos[i3+2] = (dustTargets[i3+2] * ease) + nz;
                } dustGeo.attributes.position.needsUpdate = true;
            }

            const nPos = nodeGeo.attributes.position.array;
            for(let i=0; i<nodeCount; i++) {
                let i3 = i*3; let nx = Math.sin(time * 0.3 + nodePhases[i]) * 15 * ease; let ny = Math.cos(time * 0.2 + nodePhases[i]) * 15 * ease; let nz = Math.sin(time * 0.35 + nodePhases[i]) * 15 * ease; nPos[i3] = (nodeTargets[i3] * ease) + nx; nPos[i3+1] = (nodeTargets[i3+1] * ease) + ny; nPos[i3+2] = (nodeTargets[i3+2] * ease) + nz;
                if (i < 5) networkHubs[i].mesh.position.set(nPos[i3], nPos[i3+1], nPos[i3+2]);
                if ((isDiving || isReturning || isMorphing || document.body.classList.contains('in-archive')) && i === activeNodeIndex) { let yOffset = isMobile ? 140 : 118; diveTargetPos.set(nPos[i3], nPos[i3+1] + yOffset, nPos[i3+2] + 180); diveLookPos.set(nPos[i3], nPos[i3+1] + yOffset, nPos[i3+2]); }
            } nodeGeo.attributes.position.needsUpdate = true; lineGeo.attributes.position.needsUpdate = true;

            interactableNodes.forEach((mesh, index) => { if (index !== activeNodeIndex) { let hoverScale = mesh === hoveredHub ? 1.2 : 1.0; let pulse = 1 + Math.sin(time * 2 + index) * 0.1; mesh.children[0].scale.setScalar(pulse * hoverScale * 130); } });

            if (isDiving) {
                warpProgress += 0.013; if(warpProgress >= 1) { warpProgress = 1; isDiving = false; triggerProjectorHTML(); }
                let cinematicEase = easeInOutExpo(warpProgress); camera.position.lerpVectors(cameraStartPos, diveTargetPos, cinematicEase); const targetRotation = new THREE.Quaternion(); const tempCamera = camera.clone(); tempCamera.position.copy(camera.position); tempCamera.lookAt(diveLookPos); let bankAngle = (cameraStartPos.x - diveTargetPos.x) * 0.0005 * Math.sin(warpProgress * Math.PI); tempCamera.rotateZ(bankAngle); targetRotation.copy(tempCamera.quaternion); camera.quaternion.slerpQuaternions(cameraStartQuat, targetRotation, cinematicEase);
            } else if (isReturning) {
                warpProgress -= 0.018; if (warpProgress <= 0) { warpProgress = 0; isReturning = false; interactableNodes[activeNodeIndex].children[0].scale.setScalar(130); activeNodeIndex = -1; document.getElementById('core-btn').innerText = "RETRACT"; }
                let cinematicEase = easeInOutExpo(warpProgress); let dynamicHoverPos = new THREE.Vector3(Math.sin(time * 0.1) * 80, Math.cos(time * 0.1) * 80, baseCamZ); camera.position.lerpVectors(dynamicHoverPos, diveTargetPos, cinematicEase); const targetRotation = new THREE.Quaternion(); const tempCamera = camera.clone(); tempCamera.position.copy(dynamicHoverPos); tempCamera.lookAt(scene.position); targetRotation.copy(tempCamera.quaternion); const diveRotation = new THREE.Quaternion(); const tempCamera2 = camera.clone(); tempCamera2.position.copy(diveTargetPos); tempCamera2.lookAt(diveLookPos); diveRotation.copy(tempCamera2.quaternion); camera.quaternion.slerpQuaternions(targetRotation, diveRotation, cinematicEase);
            } else if (isMorphing) {
                morphProgress += 0.015; if (morphProgress >= 1) { morphProgress = 1; isMorphing = false; }
                let cinematicEase = easeInOutExpo(morphProgress); camera.position.lerpVectors(cameraStartPos, diveTargetPos, cinematicEase); const targetRotation = new THREE.Quaternion(); const tempCamera = camera.clone(); tempCamera.position.copy(camera.position); tempCamera.lookAt(diveLookPos); let bankAngle = (cameraStartPos.x - diveTargetPos.x) * 0.0005 * Math.sin(morphProgress * Math.PI); tempCamera.rotateZ(bankAngle); targetRotation.copy(tempCamera.quaternion); camera.quaternion.slerpQuaternions(cameraStartQuat, targetRotation, cinematicEase);
            } else if (!document.body.classList.contains('in-archive')) {
                camera.position.z += (baseCamZ - camera.position.z) * 0.05; camera.position.x = Math.sin(time * 0.1) * 80; camera.position.y = Math.cos(time * 0.1) * 80; camera.lookAt(scene.position); 
                networkHubs.forEach((hub) => { let vec = hub.mesh.position.clone(); vec.project(camera); let xPos = (vec.x * 0.5 + 0.5) * window.innerWidth; let yPos = (vec.y * -0.5 + 0.5) * window.innerHeight; hub.el.style.transform = `translate(-50%, -50%) translate(${xPos}px, ${yPos}px)`; if(transitionProgress > 0.6 && vec.z < 1) hub.el.style.opacity = transitionProgress; else hub.el.style.opacity = 0; });
            }
            if(!isProjectorOpen || isMorphing) renderer.render(scene, camera);

            // ---------------- HOLOGRAM WEBGL LOGIC ----------------
            if (isProjectorOpen) {
                holoUniforms.time.value = time; // Shader twinkle
                
                if (visualState === 'SHAPE' && activeNodeName === 'Design') {
                    holoSystem.rotation.y += (0 - holoSystem.rotation.y) * 0.1; 
                    holoSystem.rotation.x += (0.1 - holoSystem.rotation.x) * 0.1; // gentle tilt
                } else if (visualState === 'SHAPE' && activeNodeName !== 'Performance') {
                    holoSystem.rotation.x += (0 - holoSystem.rotation.x) * 0.1; 
                    holoSystem.rotation.y += 0.005; // Spin others
                } else {
                    holoSystem.rotation.x += (0 - holoSystem.rotation.x) * 0.1; 
                    holoSystem.rotation.y += (0 - holoSystem.rotation.y) * 0.1; // Snap back for text
                }

                for(let i=0; i<holoCount; i++) {
                    let i3 = i*3;
                    let tx = holoTargets[i3]; let ty = holoTargets[i3+1]; let tz = holoTargets[i3+2];
                    
                    if (visualState === 'SHAPE') {
                        if (activeNodeName === 'Music') {
                            let u = holoU[i]; let v = holoV[i];
                            let radius = 45 + 15 * Math.sin(time * 5.0 + u * 4.0) * Math.cos(time * 3.0 + v * 3.0);
                            tx = radius * Math.sin(v) * Math.cos(u); ty = radius * Math.sin(v) * Math.sin(u); tz = radius * Math.cos(v);
                        } else if (activeNodeName === 'Performance') {
                            tx += Math.sin(time * 2 + i) * 40; ty += Math.cos(time * 2.5 + i) * 40; tz += Math.sin(time * 3 + i) * 40;
                        }
                    }

                    // FASTER MAGNETIC SNAP
                    holoPos[i3] += (tx - holoPos[i3]) * 0.095;
                    holoPos[i3+1] += (ty - holoPos[i3+1]) * 0.095;
                    holoPos[i3+2] += (tz - holoPos[i3+2]) * 0.095;
                }
                holoGeo.attributes.position.needsUpdate = true;
                holoRenderer.render(holoScene, holoCamera);
            }
        }
        animate();
        
        window.addEventListener('resize', () => { 
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); 
            holoCamera.aspect = holoWrapper.offsetWidth / holoWrapper.offsetHeight; holoCamera.updateProjectionMatrix(); holoRenderer.setSize(holoWrapper.offsetWidth, holoWrapper.offsetHeight);
            if(isProjectorOpen) buildDataMap();
        });

        function triggerProjectorHTML() {
            document.body.classList.add('in-archive'); document.getElementById('proj-title').innerText = `// NODE_${activeNodeName.toUpperCase()}`;
            const container = document.getElementById('projector-container'); container.style.display = 'flex';
            setTimeout(() => { isProjectorOpen = true; }, 1100); 
            setTimeout(() => { holoCamera.aspect = holoWrapper.offsetWidth / holoWrapper.offsetHeight; holoCamera.updateProjectionMatrix(); holoRenderer.setSize(holoWrapper.offsetWidth, holoWrapper.offsetHeight); triggerMorphState('TEXT'); }, 50);
        }

        function closeProjector() { isProjectorOpen = false; isReturning = true; warpProgress = 1; document.getElementById('projector-container').style.display = 'none'; document.body.classList.remove('in-archive'); }
    </script>
</body>
